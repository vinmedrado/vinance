
services:
  backend:
    build: .
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy

  admin_streamlit:
    build: .
    command: streamlit run legacy_streamlit/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles: ["admin"]
    depends_on:
      - backend


  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financeos
      POSTGRES_USER: financeos
      POSTGRES_PASSWORD: financeos
      POSTGRES_MULTIPLE_DATABASES: "financeos,financeos_mlflow"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeos -d financeos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

#  mlflow:
#    image: ghcr.io/mlflow/mlflow:v2.10.0
#    ports:
#      - "5000:5000"
#    volumes:
#      - ./mlruns:/mlruns
#    command: >
#      mlflow server
#      --host 0.0.0.0
#      --backend-store-uri postgresql+psycopg2://financeos:financeos@postgres:5432/financeos_mlflow
#      --default-artifact-root /mlruns

  worker:
    build: .
    env_file: .env
    command: celery -A workers.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build: .
    env_file: .env
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
