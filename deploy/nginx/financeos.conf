server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  # API oficial. Em produção, o frontend chama VITE_API_URL=/api.
  location /api/ {
    proxy_pass http://backend:8000/api/;
  }

  # Rotas operacionais expostas fora de /api para healthchecks e integrações.
  location = /health {
    proxy_pass http://backend:8000/health;
  }

  location = /ready {
    proxy_pass http://backend:8000/ready;
  }

  location = /health/full {
    proxy_pass http://backend:8000/health/full;
  }

  # Compatibilidade para módulos SaaS adicionados antes da padronização /api.
  location /demo/ {
    proxy_pass http://backend:8000/demo/;
  }

  location /analytics/ {
    proxy_pass http://backend:8000/analytics/;
  }

  location /billing/ {
    proxy_pass http://backend:8000/billing/;
  }

  # Frontend React/Vite oficial.
  location / {
    proxy_pass http://frontend:80;
  }
}
